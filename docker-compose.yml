services:
  postgres:
    image: postgres:16
    container_name: 'chat-app-postgres'
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d chat_app' ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    container_name: 'chat-app-backend'
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_app?schema=public
    depends_on:
      - postgres
    ports:
      - '3000:3000'

  frontend:
    container_name: 'chat-app-frontend'
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      DOCKER: 'true'
      QUASAR_DEV_HOST: '0.0.0.0'
      QUASAR_DEV_PORT: '9001'
    depends_on:
      - backend
    ports:
      - '9001:9001'

volumes:
  postgres_data: