services:
  backend:
    container_name: 'chat-app-backend'
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '3000:3000'

  frontend:
    container_name: 'chat-app-frontend'
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      DOCKER: 'true'
      QUASAR_DEV_HOST: '0.0.0.0'
      QUASAR_DEV_PORT: '9001'
    depends_on:
      - backend
    ports:
      - '9001:9001'
